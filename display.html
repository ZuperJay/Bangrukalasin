
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU KALASIN — LIVE MONITOR</title>
    <!-- ใช้ Google Fonts ที่ดูทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary-color: #ff6a00;
            --live-green: #28a745;
            --bg-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Kanit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* ── LIVE STATUS INDICATOR (มุมขวาล่าง) ── */
        .live-status {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: var(--live-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--live-green);
            animation: blink 1.2s infinite;
        }

        .live-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.85);
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ── DISPLAY CARD ── */
        #display-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
            z-index: 10;
        }

        #display-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Avatar Styling */
        .avatar-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 30px;
        }

        .avatar-border {
            position: absolute;
            inset: -8px;
            border: 4px solid var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 106, 0, 0.5);
            animation: pulse-border 2s infinite;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a1a;
            position: relative;
            z-index: 2;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Typography */
        .name-label {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .amount-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 106, 0, 0.6);
        }

        .message-box {
            font-size: 2.2rem;
            color: #ffd2b3;
            max-width: 80vw;
            font-weight: 400;
            line-height: 1.4;
        }

        /* ── PROGRESS BAR ── */
        .progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff6a00, #ffc400);
            transform-origin: left;
            box-shadow: 0 0 15px var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- สัญลักษณ์ Live -->
    <div class="live-status">
        <div class="live-dot"></div>
        <div class="live-text">LIVE</div>
    </div>

    <!-- ส่วนแสดงผล -->
    <div id="display-card">
        <div class="avatar-container">
            <div class="avatar-border"></div>
            <img id="user-photo" class="avatar-image" src="" alt="User">
        </div>
        <div id="user-name" class="name-label">ชื่อลูกค้า</div>
        <div id="tip-amount" class="amount-value">0.-</div>
        <div id="user-message" class="message-box">ข้อความของคุณจะแสดงตรงนี้</div>
    </div>

    <!-- แถบเวลาลดลง -->
    <div id="progress-wrap" class="progress-container" style="display:none;">
        <div id="progress-timer" class="progress-bar"></div>
    </div>

    <script>
        // ข้อมูล Firebase อ้างอิงจากรูปภาพที่คุณส่งมา
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90" // อัปเดต App ID แล้ว
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DISPLAY_DURATION = 40000; // 40 วินาที
        let tipQueue = [];
        let isProcessing = false;

        // ดักฟังเฉพาะข้อมูลที่สถานะเปลี่ยนเป็น approved
        db.ref('live_tips').on('child_changed', (snapshot) => {
            const data = snapshot.val();
            if (data.status === 'approved') {
                tipQueue.push(data);
                if (!isProcessing) processQueue();
            }
        });

        async function processQueue() {
            if (tipQueue.length === 0) {
                isProcessing = false;
                return;
            }

            isProcessing = true;
            const currentTip = tipQueue.shift();

            // อัปเดตข้อมูลในหน้าจอ
            document.getElementById('user-name').innerText = currentTip.name || 'FC BANGRU';
            document.getElementById('tip-amount').innerText = (currentTip.amount || 0).toLocaleString() + '.-';
            document.getElementById('user-message').innerText = currentTip.message || '';
            document.getElementById('user-photo').src = currentTip.photo || 'https://via.placeholder.com/250?text=BANGRU';

            // เริ่มแสดงผล
            const card = document.getElementById('display-card');
            const progWrap = document.getElementById('progress-wrap');
            const progBar = document.getElementById('progress-timer');

            card.classList.add('active');
            progWrap.style.display = 'block';
            
            // รีเซ็ต Progress Bar
            progBar.style.transition = 'none';
            progBar.style.transform = 'scaleX(1)';
            
            // เริ่มนับถอยหลัง Bar
            setTimeout(() => {
                progBar.style.transition = `transform ${DISPLAY_DURATION}ms linear`;
                progBar.style.transform = 'scaleX(0)';
            }, 100);

            // รอจนครบเวลา
            await new Promise(resolve => setTimeout(resolve, DISPLAY_DURATION));

            // จางหายไป
            card.classList.remove('active');
            setTimeout(() => {
                progWrap.style.display = 'none';
                processQueue(); // ทำคิวถัดไป
            }, 800);
        }
    </script>
</body>
</html>

```
