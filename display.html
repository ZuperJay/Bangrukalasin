<!DOCTYPE html>
<html lang="th">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0a0a0a; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .header-title { text-align: center; color: #ff6a00; font-size: 1.8rem; margin-bottom: 20px; }
        
        .tip-card { 
            background: #1a1a1a; border: 2px solid #333; border-radius: 15px; 
            padding: 20px; margin-bottom: 20px; position: relative;
        }
        .slip-img { 
            width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; 
            margin-bottom: 15px; border: 1px solid #444; cursor: pointer; background: #000;
        }
        
        .info { margin-bottom: 15px; }
        .name { font-size: 1.4rem; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .prof-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ff6a00; }
        .amount { font-size: 2.2rem; color: #00e878; font-weight: bold; margin: 5px 0; }
        .message { background: #2a2a2a; padding: 12px; border-radius: 8px; color: #ddd; font-style: italic; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-approve { background: #ff6a00; color: white; }
        .btn-reject { background: #333; color: white; border: 1px solid #555; }
        
        .status-badge { 
            text-align: center; margin-bottom: 10px; padding: 6px; 
            border-radius: 5px; font-weight: bold; background: #ffc107; color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">BANGRU ADMIN MONITOR</h2>
        <div id="tip-list">กำลังรอรายการใหม่...</div>
    </div>

    <script>
        // --- Firebase Config (อัปเดตแบบเต็ม) ---
        const fbConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90",
            measurementId: "G-YDGMDD1EEL"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        // แสดงเฉพาะรายการที่รอการอนุมัติ (pending)
        db.ref('live_tips').orderByChild('status').equalTo('pending').on('value', snap => {
            const listDiv = document.getElementById('tip-list');
            listDiv.innerHTML = '';
            const data = snap.val();
            
            if (!data) {
                listDiv.innerHTML = '<p style="text-align:center; color:#666; font-size:1.2rem; margin-top:50px;">ไม่มีรายการรอคิวในขณะนี้ ✅</p>';
                return;
            }

            Object.keys(data).forEach(key => {
                const item = data[key];
                const card = document.createElement('div');
                card.className = 'tip-card';
                
                let profImgHTML = item.photo ? `<img src="${item.photo}" class="prof-pic">` : '👤';
                let slipImgHTML = item.slip ? `<img src="${item.slip}" class="slip-img" onclick="window.open(this.src)" alt="สลิปโอนเงิน">` : '<div style="text-align:center; padding: 20px; color: #f00;">ไม่มีรูปสลิป</div>';

                card.innerHTML = `
                    <div class="status-badge">🔥 มีรายการใหม่เข้ามา! ตรวจสอบสลิปก่อนกดยืนยัน 🔥</div>
                    ${slipImgHTML}
                    <div class="info">
                        <div class="name">${profImgHTML} ${item.name}</div>
                        <div class="amount">${item.amount}.-</div>
                        <div class="message">"${item.message || 'ไม่มีข้อความ'}"</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-approve" onclick="updateStatus('${key}', 'approved')">✅ ยืนยัน (ขึ้นจอ)</button>
                        <button class="btn-reject" onclick="updateStatus('${key}', 'rejected')">❌ ปฏิเสธ (ลบทิ้ง)</button>
                    </div>
                `;
                listDiv.prepend(card); // เรียงรายการใหม่ไว้บนสุด
            });
        });

        function updateStatus(key, newStatus) {
            if (newStatus === 'rejected') {
                if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
                    db.ref('live_tips/' + key).remove();
                }
            } else {
                db.ref('live_tips/' + key).update({ status: 'approved' });
            }
        }
    </script>
</body>
</html>
