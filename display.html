
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BANGRU LIVE DISPLAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Kanit:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; overflow: hidden; font-family: 'Kanit'; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #display-container { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; animation: zoomIn 0.5s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .live-tag { position: fixed; top: 30px; right: 30px; font-family: 'Orbitron'; color: #ff2d78; font-size: 2rem; display: flex; align-items: center; gap: 10px; }
        .live-tag::before { content: ''; width: 15px; height: 15px; background: #ff2d78; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .amount { font-family: 'Orbitron'; font-size: 8rem; color: #ff6a00; text-shadow: 0 0 40px rgba(255,106,0,0.6); margin-bottom: 10px; }
        .name { font-size: 4rem; color: #fff; margin-bottom: 20px; }
        
        .photo-frame {
            width: 450px; height: 450px;
            border: 15px solid #ff6a00;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(255,106,0,0.4);
            margin-bottom: 30px;
            background: #111;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .message { font-size: 3rem; color: #00e878; text-align: center; max-width: 80%; line-height: 1.2; font-style: italic; }

        .timer { position: fixed; bottom: 30px; font-family: 'Orbitron'; font-size: 2.5rem; color: #444; }
    </style>
</head>
<body>

    <div class="live-tag">LIVE</div>

    <div id="display-container">
        <div class="amount" id="d-amount">0</div>
        <div class="name" id="d-name">NAME</div>
        <div class="photo-frame">
            <img id="d-photo" src="">
        </div>
        <div class="message" id="d-message">MESSAGE</div>
        <div class="timer" id="d-timer">40s</div>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        let isShowing = false;
        let queue = [];

        db.ref('live_tips').on('child_changed', snap => {
            const tip = snap.val();
            if(tip.status === 'approved' && !isShowing) {
                showTip(tip);
            }
        });

        // ดึงของเก่าที่เพิ่งอนุมัติด้วย (เผื่อเปิดจอทีหลัง)
        db.ref('live_tips').orderByChild('status').equalTo('approved').limitToLast(1).on('value', snap => {
            const data = snap.val();
            if(data && !isShowing) {
                const key = Object.keys(data)[0];
                showTip(data[key]);
            }
        });

        function showTip(tip) {
            isShowing = true;
            const container = document.getElementById('display-container');
            document.getElementById('d-amount').innerText = tip.amount + ".-";
            document.getElementById('d-name').innerText = tip.name;
            document.getElementById('d-photo').src = tip.photo || 'https://via.placeholder.com/500?text=BANGRU';
            document.getElementById('d-message').innerText = tip.message;
            
            container.style.display = 'flex';
            
            let count = 40;
            const timerEl = document.getElementById('d-timer');
            timerEl.innerText = count + "s";

            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count + "s";
                if(count <= 0) {
                    clearInterval(interval);
                    container.style.display = 'none';
                    isShowing = false;
                    // เมื่อโชว์จบ ให้เปลี่ยนสถานะเป็น 'shown' เพื่อไม่ให้วนกลับมาโชว์อีก
                    // ค้นหา key เพื่ออัปเดต (ในระบบจริงควรเก็บ key ไว้ตอนรับ data)
                    db.ref('live_tips').orderByChild('ts').equalTo(tip.ts).once('value', s => {
                        const k = Object.keys(s.val())[0];
                        db.ref('live_tips/' + k).update({ status: 'shown' });
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
