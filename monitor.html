<!-- Monitor Layout 9:16 (LED SCREEN) -->
<div id="tip-display" class="w-[1080px] h-[1920px] bg-black text-white flex flex-col p-16 relative overflow-hidden">
    
    <!-- ส่วนบน: จำนวนเงิน (ใหญ่พิเศษ) -->
    <div class="h-1/3 flex flex-col justify-center items-center">
        <div class="logo-bangru text-6xl mb-4 animate-pulse">TOTAL TIPS</div>
        <div class="text-[25rem] font-black text-white leading-none drop-shadow-[0_0_50px_rgba(255,0,136,1)]">
            ฿${data.amount}
        </div>
    </div>

    <!-- ส่วนล่าง: แบ่งซ้าย(รูป) ขวา(ข้อความ) -->
    <div class="h-2/3 flex items-end gap-12 pb-20">
        
        <!-- ซ้าย: รูปคน (ใหญ่ ชัด) -->
        <div class="w-[45%] h-[85%]">
            <div class="w-full h-full rounded-[5rem] border-[10px] border-pink-500 overflow-hidden shadow-[0_0_80px_rgba(255,0,136,0.5)]">
                <img src="${data.photo}" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- ขวา: ชื่อผู้ส่ง + ข้อความ -->
        <div class="w-[55%] h-[85%] flex flex-col justify-end">
            <!-- ชื่อผู้ส่ง -->
            <div class="mb-10">
                <span class="text-4xl text-gray-400 font-bold tracking-widest block mb-4 uppercase italic">SENDER:</span>
                <h2 class="text-9xl font-black text-white truncate">${data.sender}</h2>
            </div>
            
            <!-- กล่องข้อความ -->
            <div class="bg-gradient-to-br from-pink-600/20 to-purple-900/40 p-12 rounded-[4rem] border-l-[15px] border-pink-500 backdrop-blur-md">
                <p class="text-7xl font-medium leading-tight text-pink-100">
                    "${data.message}"
                </p>
            </div>
        </div>
    </div>

    <!-- เส้นตกแต่งวิ่งรอบจอ -->
    <div class="absolute inset-0 border-[20px] border-pink-500/20 pointer-events-none"></div>
</div>

<script>
    // ส่วนควบคุมเวลาแสดงผล
    const SHOW_TIME = 40000; // 40 วินาที
    // หลังจากครบ 40 วิ ให้ล้างหน้าจอ หรือโชว์วน VJ Loop ของร้าน
    setTimeout(() => { document.getElementById('tip-display').style.opacity = '0'; }, SHOW_TIME);
</script>
