<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU LED MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --or: #ff6a00; /* สีส้ม Bangru */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Kanit', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .corner-logo {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            color: var(--or);
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .live-indicator {
            position: fixed;
            top: 20px;
            left: 30px;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 8px; height: 8px; background: #ff3b3b; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .display-container {
            text-align: center;
            width: 90%;
            max-width: 1200px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #m-photo {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 6px solid var(--or);
            object-fit: cover;
            margin-bottom: 20px;
            background: #111;
        }

        .m-name { 
            font-size: 3.5rem; 
            font-weight: 700; 
            margin-bottom: 5px; 
            color: #fff; 
        }

        .m-amount { 
            font-family: 'Orbitron'; 
            font-size: 8rem; 
            font-weight: 900; 
            color: var(--or); 
            line-height: 1; 
            margin: 10px 0;
        }

        .m-msg { 
            font-size: 2.5rem; 
            color: #888; 
            font-weight: 400;
        }

        #alert-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 15px solid var(--or);
        }
        .new-tip-text { font-family: 'Orbitron'; font-size: 8rem; color: var(--or); font-weight: 900; }
        .new-tip-name { font-size: 5rem; color: #fff; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="live-indicator"><div class="dot"></div> LIVE MONITOR</div>

    <div class="display-container" id="main-ui">
        <img id="m-photo" src="https://via.placeholder.com/300x300/000000/FF6A00?text=BANGRU">
        <div class="m-name" id="m-name">READY</div>
        <div class="m-amount" id="m-amount">WAITING...</div>
        <div class="m-msg" id="m-message">สแกน QR เพื่อส่งข้อความขึ้นจอ</div>
    </div>

    <div id="alert-screen">
        <div class="new-tip-text">NEW TIP!</div>
        <div class="new-tip-name" id="alert-name"></div>
    </div>

    <div class="corner-logo">BANGRU KALASIN</div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <script>
        // ── Firebase Config (อัปเดตให้ตรงกับ Project ของคุณ) ──
        const fbConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90",
            measurementId: "G-YDGMDD1EEL"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        const sound = document.getElementById('notif-sound');
        const seenKeys = new Set();

        // ฟังคำสั่งเฉพาะเมื่อมีการ Approve ทิป (child_changed)
        db.ref('live_tips').on('child_changed', snap => {
            const data = snap.val();
            const key = snap.key;
            
            // แสดงผลเฉพาะเมื่อ Status เป็น 'approved' และยังไม่เคยโชว์ในรอบนี้
            if (data && data.status === 'approved' && !seenKeys.has(key)) {
                seenKeys.add(key);
                updateDisplay(data);
                showTipAlert(data.name, data.amount);
            }
        });

        function updateDisplay(data) {
            document.getElementById('m-name').innerText = data.name || 'FC BANGRU';
            document.getElementById('m-amount').innerText = (data.amount || 0).toLocaleString() + '.-';
            document.getElementById('m-message').innerText = data.message || '';
            
            if (data.photo && data.photo.startsWith('data:image')) {
                document.getElementById('m-photo').src = data.photo;
            } else {
                document.getElementById('m-photo').src = "https://via.placeholder.com/300x300/000000/FF6A00?text=FC";
            }
        }

        function showTipAlert(name, amount) {
            sound.play().catch(e => { console.log("คลิกที่หน้าจอหนึ่งครั้งเพื่อเปิดระบบเสียง"); });
            const alertEl = document.getElementById('alert-screen');
            document.getElementById('alert-name').innerText = name + "\n" + (amount || 0).toLocaleString() + ".-";
            alertEl.style.display = 'flex';
            
            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 6000); // แสดงค้างไว้ 6 วินาที
        }

        // ต้องคลิกที่หน้าจอหนึ่งครั้งเพื่อให้ Browser อนุญาตให้เล่นเสียงแจ้งเตือน
        document.body.onclick = () => {
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
            console.log("Audio Unlocked!");
        };
    </script>
</body>
</html>
