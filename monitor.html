<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BANGRU MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700&display=swap');
        body { background-color: transparent; font-family: 'Kanit', sans-serif; overflow: hidden; }
        .tip-card { animation: zoomIn 0.5s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        /* เอฟเฟกต์ตัวหนังสือสีแดง ขอบขาวให้มองเห็นชัดบนจอ LED */
        .text-glow {
            color: #ff003c;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 20px #ff0088;
        }
    </style>
</head>
<body>
    <div id="display-area" class="h-screen w-screen flex flex-col items-center justify-center p-10">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:b3c5ada0ad8eb240ea1b90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('live_tips').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (Date.now() - data.timestamp > 15000) return; // ไม่แสดงข้อมูลเก่าที่เกิน 15 วินาที

            showTip(data);
        });

        function showTip(data) {
            const area = document.getElementById('display-area');
            
            // เช็คว่ามีรูปไหม ถ้าไม่มีให้เว้นว่างไว้
            const imageHtml = data.photo 
                ? `<img src="${data.photo}" class="max-h-[60vh] w-auto mx-auto rounded-3xl border-8 border-pink-500 shadow-[0_0_50px_rgba(255,0,136,1)] object-cover mt-6">` 
                : '';

            area.innerHTML = `
                <div class="tip-card text-center w-full max-w-5xl">
                    <h1 class="text-glow text-6xl md:text-8xl font-black mb-4 uppercase tracking-wider line-clamp-2 leading-tight">
                        "${data.message}"
                    </h1>
                    
                    <h2 class="text-white text-4xl md:text-5xl font-bold bg-black/60 inline-block px-8 py-4 rounded-full backdrop-blur-sm border border-white/30">
                        FROM: <span class="text-pink-400">${data.sender}</span> | TIPS: <span class="text-green-400">฿${data.amount}</span>
                    </h2>

                    ${imageHtml}
                </div>
            `;

            // ค้างไว้บนจอ 20 วินาทีแล้วหายไป
            setTimeout(() => { area.innerHTML = ''; }, 20000);
        }
    </script>
</body>
</html>
