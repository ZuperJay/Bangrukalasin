```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU LED MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --or: #ff6a00; /* สีส้ม Bangru */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000; /* ดำสนิทสำหรับจอ LED */
            color: #fff; 
            font-family: 'Kanit', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* โลโก้เล็กๆ ที่มุมล่างขวา */
        .corner-logo {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            color: var(--or);
            opacity: 0.6;
            letter-spacing: 2px;
        }

        /* จุดกระพริบ Live มุมบนซ้าย */
        .live-indicator {
            position: fixed;
            top: 20px;
            left: 30px;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 8px; height: 8px; background: #ff2d78; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* การจัดวางหน้าจอหลัก */
        .display-container {
            text-align: center;
            width: 90%;
            max-width: 1200px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #m-photo {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 6px solid var(--or);
            object-fit: cover;
            margin-bottom: 20px;
            background: #111;
        }

        .m-name { 
            font-size: 3.5rem; 
            font-weight: 700; 
            margin-bottom: 5px; 
            color: #fff; 
        }

        .m-amount { 
            font-family: 'Orbitron'; 
            font-size: 8rem; 
            font-weight: 900; 
            color: var(--or); 
            line-height: 1; 
            margin: 10px 0;
        }

        .m-msg { 
            font-size: 2.5rem; 
            color: #888; 
            font-weight: 400;
        }

        /* หน้าจอแจ้งเตือนทิปเข้า (Full Screen) */
        #alert-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 15px solid var(--or);
        }
        .new-tip-text { font-family: 'Orbitron'; font-size: 8rem; color: var(--or); font-weight: 900; }
        .new-tip-name { font-size: 5rem; color: #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="live-indicator"><div class="dot"></div> LIVE MONITOR</div>

    <div class="display-container" id="main-ui">
        <img id="m-photo" src="https://via.placeholder.com/300x300/000000/FF6A00?text=BANGRU">
        <div class="m-name" id="m-name">READY</div>
        <div class="m-amount" id="m-amount">WAITING...</div>
        <div class="m-msg" id="m-message">สแกน QR เพื่อส่งข้อความขึ้นจอ</div>
    </div>

    <div id="alert-screen">
        <div class="new-tip-text">NEW TIP!</div>
        <div class="new-tip-name" id="alert-name"></div>
    </div>

    <div class="corner-logo">BANGRU KALASIN</div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <script>
        const fbConfig = { databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        const sound = document.getElementById('notif-sound');
        let isFirstLoad = true;

        db.ref('live_tips').limitToLast(1).on('child_added', snap => {
            const data = snap.val();
            if (!data) return;

            // อัปเดตข้อมูลหน้าจอหลัก
            document.getElementById('m-name').innerText = data.name;
            document.getElementById('m-amount').innerText = data.amount + '.-';
            document.getElementById('m-message').innerText = data.message;
            
            if (data.photo && data.photo.length > 100) {
                document.getElementById('m-photo').src = data.photo;
            } else {
                document.getElementById('m-photo').src = "https://via.placeholder.com/300x300/000000/FF6A00?text=FC";
            }

            // ถ้าไม่ใช่การโหลดครั้งแรก ให้โชว์หน้าจอ Alert
            if (!isFirstLoad) {
                showTipAlert(data.name, data.amount);
            }
            isFirstLoad = false;
        });

        function showTipAlert(name, amount) {
            sound.play().catch(e => {});
            const alertEl = document.getElementById('alert-screen');
            document.getElementById('alert-name').innerText = name + " (" + amount + ".-)";
            alertEl.style.display = 'flex';
            
            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 5000); // แสดงค้างไว้ 5 วินาที
        }

        // คลิกเพื่อเปิดระบบเสียง
        document.body.onclick = () => {
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; });
        };
    </script>
</body>
</html>

```
