<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU KALASIN - Tips System v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Kanit:wght@300;500;700&display=swap');
        
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: white; overflow-x: hidden; }

        /* Bangru LED Glow Effect */
        .logo-bangru {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 
                0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff, 
                0 0 42px #ff0088, 0 0 82px #ff0088, 0 0 92px #ff0088, 
                0 0 102px #ff0088, 0 0 151px #ff0088;
            animation: pulsate 1.5s infinite alternate;
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px #fff, 0 0 40px #ff0088, 0 0 80px #ff0088, 0 0 90px #ff0088; }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px #fff, 0 0 10px #ff0088, 0 0 45px #ff0088, 0 0 55px #ff0088; }
        }

        .step-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .amount-btn { border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s; font-size: 1.25rem; font-weight: 700; border-radius: 1rem; padding: 1rem 0; }
        .amount-btn.active { background: linear-gradient(45deg, #ff0088, #7000ff); border-color: transparent; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 0, 136, 0.4); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <header class="text-center mt-6 mb-10">
        <h1 class="logo-bangru">BANGRU</h1>
        <p class="text-pink-500 font-bold tracking-[0.3em] text-sm">KALASIN CLUB & BAR</p>
    </header>

    <button onclick="window.open('lineup.png', '_blank')" class="mb-8 bg-white/10 border border-white/20 px-6 py-2 rounded-full text-xs font-bold hover:bg-white/20 transition">
        <i class="fas fa-calendar-alt mr-2"></i> ดู LINE UP ศิลปิน
    </button>

    <main class="w-full max-w-md space-y-6">
        
        <section class="step-card p-6 text-center">
            <h2 class="text-gray-400 text-xs mb-4 uppercase tracking-widest">ช่องทางการชำระเงิน</h2>
            
            <div class="space-y-4 mb-6">
                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                    <p class="text-xs text-blue-400 font-bold mb-1">พร้อมเพย์ / PromptPay</p>
                    <p class="text-2xl font-black tracking-tighter" id="pp-num">064-265-3497</p>
                    <button onclick="copyText('0642653497')" class="mt-2 text-[10px] bg-blue-600/20 text-blue-400 px-4 py-1 rounded-full border border-blue-400/30">
                        <i class="far fa-copy mr-1"></i> คัดลอกเลขพร้อมเพย์
                    </button>
                </div>

                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                    <p class="text-xs text-green-400 font-bold mb-1">ธนาคารกสิกรไทย</p>
                    <p class="text-2xl font-black tracking-tighter" id="kb-num">093-8-29649-9</p>
                    <button onclick="copyText('0938296499')" class="mt-2 text-[10px] bg-green-600/20 text-green-400 px-4 py-1 rounded-full border border-green-400/30">
                        <i class="far fa-copy mr-1"></i> คัดลอกเลขบัญชี
                    </button>
                </div>
            </div>

            <div class="space-y-2">
                <p class="text-xs text-gray-500 mb-2">เลือกจำนวนเงิน</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectAmount(50, this)" class="amount-btn">50.-</button>
                    <button onclick="selectAmount(100, this)" class="amount-btn">100.-</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectAmount(200, this)" class="amount-btn">200.-</button>
                    <button onclick="selectAmount(500, this)" class="amount-btn">500.-</button>
                </div>
                <div class="flex justify-center">
                    <button onclick="selectAmount(1000, this)" class="amount-btn w-full">1,000.-</button>
                </div>
            </div>
        </section>

        <section class="step-card p-6 space-y-4">
            <div>
                <label class="block text-[10px] uppercase text-gray-500 mb-2 ml-1">ชื่อผู้ส่ง</label>
                <input type="text" id="sender-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-pink-500 outline-none" placeholder="ระบุชื่อของคุณ">
            </div>

            <div>
                <label class="block text-[10px] uppercase text-gray-500 mb-2 ml-1">ข้อความที่จะเอาขึ้นจอ</label>
                <textarea id="tip-message" rows="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-pink-500 outline-none" placeholder="พิมพ์ข้อความ..."></textarea>
            </div>

            <div class="pt-2">
                <label class="block text-[10px] uppercase text-pink-500 font-bold mb-2 ml-1">แนบรูปสลิปโอนเงิน (บังคับ)</label>
                <div class="relative border-2 border-dashed border-white/10 rounded-2xl p-6 text-center" id="drop-zone">
                    <input type="file" id="slip-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFileUpload(event)">
                    <div id="upload-ui">
                        <i class="fas fa-camera text-2xl text-white/30 mb-2"></i>
                        <p class="text-xs text-gray-400">กดเพื่ออัปโหลดสลิป</p>
                    </div>
                    <div id="preview-container" class="hidden">
                        <img id="preview-img" class="max-h-48 mx-auto rounded-lg">
                        <p class="text-green-500 text-[10px] mt-2 font-bold"><i class="fas fa-check"></i> ตรวจพบสลิปแล้ว</p>
                    </div>
                </div>
            </div>
        </section>

        <button id="submit-btn" disabled onclick="processSubmit()" class="w-full py-5 rounded-2xl font-black text-xl transition-all disabled:opacity-20 disabled:grayscale bg-gradient-to-r from-pink-600 to-purple-600 text-white shadow-[0_10px_30px_rgba(255,0,136,0.3)]">
            ส่ง TIPS ขึ้นจอ LED
        </button>

    </main>

    <footer class="mt-12 mb-8 text-white/20 text-[10px] tracking-widest uppercase">
        &copy; 2026 BANGRU KALASIN
    </footer>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:b3c5ada0ad8eb240ea1b90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedAmount = 0;
        let base64Image = "";

        function selectAmount(amt, btn) {
            selectedAmount = amt;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            checkReady();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("คัดลอกเลขเรียบร้อยแล้ว: " + text);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 600;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('preview-img').src = base64Image;
                    document.getElementById('preview-container').classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    checkReady();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function checkReady() {
            const btn = document.getElementById('submit-btn');
            if (selectedAmount > 0 && base64Image !== "") {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        async function processSubmit() {
            const name = document.getElementById('sender-name').value || "FC BANGRU";
            const message = document.getElementById('tip-message').value || "จัดให้วัยรุ่น!";
            const btn = document.getElementById('submit-btn');

            btn.innerText = "กำลังส่งข้อมูล...";
            btn.disabled = true;

            try {
                await db.ref('live_tips').push({
                    sender: name,
                    message: message,
                    amount: selectedAmount,
                    photo: base64Image,
                    timestamp: Date.now()
                });
                alert("ส่ง Tips เรียบร้อย! รอชมบนจอได้เลย");
                location.reload();
            } catch (error) {
                alert("ล้มเหลว กรุณาลองใหม่");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
