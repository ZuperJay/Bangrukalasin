<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU KALASIN - DJ Tips System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Kanit:wght@300;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: white; }
        
        /* BANGRU LED Glow */
        .logo-bangru {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0088, 0 0 40px #ff0088;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.8; text-shadow: 0 0 10px #fff, 0 0 20px #ff0088; }
            to { opacity: 1; text-shadow: 0 0 15px #fff, 0 0 30px #ff0088, 0 0 50px #ff0088; }
        }

        .step-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .amount-btn.active { background: #ff0088; border-color: transparent; box-shadow: 0 0 15px #ff0088; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-end mb-4">
        <button onclick="window.open('lineup.png', '_blank')" class="bg-white text-black font-black px-6 py-3 rounded-2xl text-xl shadow-lg hover:scale-105 transition active:scale-95">
            LINE UP <i class="fas fa-external-link-alt ml-1 text-sm"></i>
        </button>
    </div>

    <header class="text-center mb-8">
        <h1 class="logo-bangru text-5xl font-bold tracking-tighter">BANGRU</h1>
        <p class="text-pink-500 text-xs tracking-[0.4em] font-bold">KALASIN CLUB & BAR</p>
    </header>

    <main class="w-full max-w-md space-y-6">

        <section class="step-card p-5">
            <label class="block text-sm font-bold text-gray-400 mb-3">1. อัปโหลดรูปภาพของคุณ (เพื่อโชว์บนจอ)</label>
            <div class="relative border-2 border-dashed border-white/20 rounded-2xl p-4 text-center">
                <input type="file" id="user-photo" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewFile('user-photo', 'preview-user')">
                <div id="ui-user">
                    <i class="fas fa-image text-2xl mb-1 opacity-50"></i>
                    <p class="text-xs text-gray-500">กดเพื่อเลือกรูปภาพของคุณ</p>
                </div>
                <img id="preview-user" class="max-h-40 mx-auto rounded-lg hidden">
            </div>
        </section>

        <section class="step-card p-5 text-center">
            <label class="block text-sm font-bold text-gray-400 mb-4 text-left">2 & 3. เลือกจำนวนเงินและสแกน QR</label>
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="setAmount(50, this)" class="amount-btn border border-white/20 py-3 rounded-xl font-bold text-xl">50.-</button>
                <button onclick="setAmount(100, this)" class="amount-btn border border-white/20 py-3 rounded-xl font-bold text-xl">100.-</button>
                <button onclick="setAmount(200, this)" class="amount-btn border border-white/20 py-3 rounded-xl font-bold text-xl">200.-</button>
                <button onclick="setAmount(500, this)" class="amount-btn border border-white/20 py-3 rounded-xl font-bold text-xl">500.-</button>
            </div>
            <button onclick="setAmount(1000, this)" class="amount-btn w-full border border-white/20 py-3 rounded-xl font-bold text-xl mb-6">1,000.-</button>

            <div id="qr-area" class="bg-white p-4 rounded-3xl mx-auto w-48 h-48 hidden flex items-center justify-center">
                <img id="qr-img" src="" alt="PromptPay QR">
            </div>
            <p id="qr-hint" class="text-[10px] text-gray-500 mt-2 hidden italic">* แคปหน้าจอเพื่อนำไปสแกนในแอปธนาคาร</p>

            <div class="mt-4 pt-4 border-t border-white/10 space-y-2">
                <p class="text-xs text-gray-400">หรือโอนเข้าบัญชีโดยตรง</p>
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl">
                    <span class="text-sm font-bold">093-8-29649-9 (กสิกร)</span>
                    <button onclick="copyText('0938296499')" class="text-pink-500 text-xs">คัดลอก</button>
                </div>
            </div>
        </section>

        <section class="step-card p-5 space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">4. ชื่อเจ้าของ Tips</label>
                <input type="text" id="sender-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-pink-500 outline-none" placeholder="ระบุชื่อ">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">5. ข้อความที่จะเอาขึ้นจอ</label>
                <textarea id="tip-message" rows="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-pink-500 outline-none" placeholder="จัดให้วัยรุ่น!"></textarea>
            </div>
        </section>

        <section class="step-card p-5 border-pink-500/30">
            <label class="block text-sm font-bold text-pink-500 mb-3">6. แนบรูปสลิปการโอนเงิน (บังคับ)</label>
            <div class="relative border-2 border-dashed border-pink-500/40 rounded-2xl p-4 text-center bg-pink-500/5">
                <input type="file" id="slip-photo" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewFile('slip-photo', 'preview-slip')">
                <div id="ui-slip">
                    <i class="fas fa-receipt text-2xl mb-1 text-pink-500"></i>
                    <p class="text-xs text-pink-300">กดเพื่ออัปโหลดสลิปยืนยัน</p>
                </div>
                <img id="preview-slip" class="max-h-40 mx-auto rounded-lg hidden">
            </div>
        </section>

        <button id="submit-btn" disabled onclick="processSubmit()" class="w-full py-5 rounded-3xl font-black text-2xl shadow-2xl transition-all bg-gray-700 text-gray-500 cursor-not-allowed">
            7. ยืนยันการส่ง TIPS
        </button>

    </main>

    <footer class="mt-10 mb-8 text-white/20 text-[10px] tracking-widest">&copy; 2026 BANGRU KALASIN</footer>

    <script>
        // --- Firebase Config (User-Provided) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:b3c5ada0ad8eb240ea1b90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedAmount = 0;
        let userImgBase64 = "";
        let slipImgBase64 = "";

        function setAmount(amt, btn) {
            selectedAmount = amt;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Show Dynamic QR using promptpay.io
            const qrImg = document.getElementById('qr-img');
            qrImg.src = `https://promptpay.io/0642653497/${amt}.png`;
            document.getElementById('qr-area').classList.remove('hidden');
            document.getElementById('qr-hint').classList.remove('hidden');
            checkReady();
        }

        function previewFile(inputId, previewId) {
            const file = document.getElementById(inputId).files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 500;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    if(inputId === 'user-photo') userImgBase64 = base64;
                    if(inputId === 'slip-photo') slipImgBase64 = base64;

                    document.getElementById(previewId).src = base64;
                    document.getElementById(previewId).classList.remove('hidden');
                    document.getElementById('ui-' + inputId.split('-')[0]).classList.add('hidden');
                    checkReady();
                }
                img.src = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        function checkReady() {
            const btn = document.getElementById('submit-btn');
            // Condition 7: Must have slip to enable
            if (selectedAmount > 0 && slipImgBase64 !== "") {
                btn.disabled = false;
                btn.classList.remove('bg-gray-700', 'text-gray-500', 'cursor-not-allowed');
                btn.classList.add('bg-gradient-to-r', 'from-pink-600', 'to-purple-600', 'text-white');
            } else {
                btn.disabled = true;
            }
        }

        async function processSubmit() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "กำลังส่ง...";
            btn.disabled = true;

            try {
                await db.ref('live_tips').push({
                    sender: document.getElementById('sender-name').value || "FC BANGRU",
                    message: document.getElementById('tip-message').value || "จัดให้ครับ!",
                    amount: selectedAmount,
                    photo: userImgBase64, // Customer photo for screen
                    slip: slipImgBase64,   // For your verification
                    timestamp: Date.now()
                });
                alert("ทำรายการสำเร็จ! รูปและข้อความกำลังขึ้นจอครับ");
                location.reload();
            } catch (e) {
                alert("ไม่สามารถส่งได้ กรุณาตรวจสอบอินเทอร์เน็ตหรือลองใหม่อีกครั้ง");
                btn.innerText = "ยืนยันการส่ง TIPS";
                btn.disabled = false;
            }
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            alert("คัดลอกแล้ว: " + txt);
        }
    </script>
</body>
</html>
