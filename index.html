<style>
    :root {
        --bangru-pink: #ff0088;
        --bangru-purple: #7000ff;
        --glass: rgba(255, 255, 255, 0.03);
    }

    body {
        background: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
        color: #fff;
    }

    /* การ์ดแบบกระจกตัดขอบเรืองแสง */
    .premium-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2rem;
        transition: all 0.3s ease;
    }

    /* ปุ่มเลือกราคาแบบ Glossy */
    .amount-btn {
        background: linear-gradient(145deg, #111, #222);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #aaa;
    }

    .amount-btn.active {
        background: linear-gradient(135deg, var(--bangru-pink), var(--bangru-purple));
        color: #fff;
        border: none;
        box-shadow: 0 0 20px rgba(255, 0, 136, 0.5);
        transform: scale(1.05);
    }

    /* ปุ่มยืนยันขนาดใหญ่ */
    .submit-glow {
        background: linear-gradient(90deg, var(--bangru-pink), var(--bangru-purple));
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 900;
        box-shadow: 0 10px 30px rgba(255, 0, 136, 0.3);
    }
</style>

<!-- ส่วน UI ที่ปรับปรุง -->
<div class="premium-card p-6 mb-6">
    <h3 class="text-center text-pink-500 font-bold mb-4 tracking-widest">SELECT AMOUNT</h3>
    <div class="grid grid-cols-3 gap-3">
        <button onclick="setAmount(100, this)" class="amount-btn py-4 rounded-2xl font-bold">100</button>
        <button onclick="setAmount(300, this)" class="amount-btn py-4 rounded-2xl font-bold">300</button>
        <button onclick="setAmount(500, this)" class="amount-btn py-4 rounded-2xl font-bold">500</button>
    </div>
</div>

<div class="premium-card p-2">
    <input type="text" id="sender-name" 
           class="w-full bg-transparent p-4 outline-none text-center text-xl font-medium" 
           placeholder="ระบุชื่อของคุณ (SENDER)">
</div>
