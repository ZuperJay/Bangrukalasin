<div class="step-04 mt-8">
    <label class="text-white text-xl">04. จ่ายเงิน & แนบสลิป</label>
    <a href="https://payment.facebook.com/pay/promptpay/" target="_blank" 
       class="block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-bold text-xl my-4 active:scale-95 transition">
       คลิกเพื่อเปิดแอปธนาคาร
    </a>

    <div class="bg-gray-800 p-4 rounded-xl border-2 border-dashed border-gray-500 text-center">
        <input type="file" id="slip-input" accept="image/*" class="hidden" onchange="handleSlipUpload(this)">
        <label for="slip-input" id="slip-label" class="cursor-pointer text-pink-400 font-bold">
            คิลกที่นี่เพื่อ "แนบรูปสลิปโอนเงิน"
        </label>
        <div id="slip-preview" class="mt-2 hidden">
            <img id="preview-img" src="" class="max-h-40 mx-auto rounded-lg">
        </div>
    </div>
</div>

<button id="submit-btn" disabled 
        class="w-full py-5 rounded-2xl font-black text-2xl mt-10 transition duration-300 bg-gray-600 text-gray-400 cursor-not-allowed">
    ยืนยันและส่ง Tips
</button>

<script>
// ฟังก์ชันเช็กการอัปโหลดสลิป
function handleSlipUpload(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('slip-preview').classList.remove('hidden');
            document.getElementById('slip-label').innerText = "✅ แนบสลิปเรียบร้อยแล้ว";
            
            // เปิดใช้งานปุ่มส่ง
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            btn.classList.remove('bg-gray-600', 'text-gray-400', 'cursor-not-allowed');
            btn.classList.add('bg-gradient-to-r', 'from-pink-500', 'to-purple-600', 'text-white', 'hover:scale-105');
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
