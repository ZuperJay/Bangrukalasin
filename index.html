<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU KALASIN - Tips System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: white; }
        .logo-3d { font-family: 'Orbitron', sans-serif; text-shadow: 3px 3px 0px #ff0088; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .step-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .amount-btn.active { background-color: #ff0088; border-color: transparent; transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 0, 136, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <header class="w-full max-w-md flex justify-between items-center mb-6">
        <h1 class="logo-3d text-3xl font-bold italic text-white">BANGRU</h1>
        <div class="text-xs text-pink-500 font-bold border border-pink-500 px-2 py-1 rounded">LIVE TIPS</div>
    </header>

    <main class="w-full max-w-md space-y-5">
        
        <section class="step-card p-6 rounded-3xl text-center">
            <h2 class="text-gray-400 text-sm mb-2">โอนเข้าบัญชี (พร้อมเพย์)</h2>
            <p class="text-2xl font-bold mb-1">Bangru</p>
            <p class="text-3xl font-black text-pink-500 tracking-wider">093-8-29649-9</p>
            
            <div class="grid grid-cols-3 gap-2 mt-6">
                <button onclick="selectAmount(50, this)" class="amount-btn border border-white/20 rounded-xl py-3 transition-all hover:bg-white/10 text-xl font-bold">50.-</button>
                <button onclick="selectAmount(100, this)" class="amount-btn border border-white/20 rounded-xl py-3 transition-all hover:bg-white/10 text-xl font-bold">100.-</button>
                <button onclick="selectAmount(200, this)" class="amount-btn border border-white/20 rounded-xl py-3 transition-all hover:bg-white/10 text-xl font-bold">200.-</button>
                <button onclick="selectAmount(500, this)" class="amount-btn border border-white/20 rounded-xl py-3 transition-all hover:bg-white/10 text-xl font-bold col-span-1">500.-</button>
                <button onclick="selectAmount(1000, this)" class="amount-btn border border-white/20 rounded-xl py-3 transition-all hover:bg-white/10 text-xl font-bold col-span-2">1,000.-</button>
            </div>

            <button onclick="openBankApp()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl mt-5 flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-blue-900/20">
                <i class="fas fa-university"></i>
                เปิดแอปธนาคารเพื่อโอน
            </button>
        </section>

        <section class="step-card p-6 rounded-3xl space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-2 ml-1">ชื่อผู้ส่ง</label>
                <input type="text" id="sender-name" class="w-full bg-black/40 border border-white/10 rounded-2xl px-4 py-3 focus:border-pink-500 outline-none transition-colors" placeholder="ใส่ชื่อของคุณ">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2 ml-1">ข้อความถึง DJ</label>
                <textarea id="tip-message" rows="2" class="w-full bg-black/40 border border-white/10 rounded-2xl px-4 py-3 focus:border-pink-500 outline-none transition-colors" placeholder="พิมพ์ข้อความ..."></textarea>
            </div>

            <div class="pt-2">
                <label class="block text-sm text-gray-400 mb-2 ml-1 text-pink-400 font-bold">แนบรูปสลิปโอนเงิน (เพื่อส่งขึ้นจอ)</label>
                <div class="relative border-2 border-dashed border-white/20 rounded-2xl p-5 text-center hover:border-pink-500/50 transition-colors" id="drop-zone">
                    <input type="file" id="slip-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFileUpload(event)">
                    <div id="upload-ui">
                        <i class="fas fa-cloud-upload-alt text-3xl text-pink-500 mb-2"></i>
                        <p class="text-sm text-gray-300">คลิกที่นี่เพื่อแนบสลิป</p>
                    </div>
                    <div id="preview-container" class="hidden">
                        <img id="preview-img" class="max-h-44 mx-auto rounded-lg shadow-xl">
                        <p class="text-green-500 text-xs mt-2 font-bold"><i class="fas fa-check-circle"></i> สลิปพร้อมส่งแล้ว</p>
                    </div>
                </div>
            </div>
        </section>

        <button id="submit-btn" disabled onclick="processSubmit()" class="w-full py-5 rounded-2xl font-black text-xl shadow-2xl transition-all disabled:opacity-40 disabled:bg-gray-700 disabled:cursor-not-allowed bg-gradient-to-r from-pink-600 to-purple-600 text-white active:scale-95">
            <i class="fas fa-paper-plane mr-2"></i> ส่ง TIPS ขึ้นจอ LED
        </button>

    </main>

    <footer class="mt-8 mb-6 text-gray-600 text-[10px] uppercase tracking-widest">
        &copy; 2026 BANGRU KALASIN CLUB & BAR
    </footer>

    <script>
        // --- การตั้งค่า Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:b3c5ada0ad8eb240ea1b90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedAmount = 0;
        let base64Image = "";

        // --- ฟังก์ชันทำงาน ---
        function selectAmount(amt, btn) {
            selectedAmount = amt;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            checkReady();
        }

        function openBankApp() {
            if(selectedAmount === 0) {
                alert("กรุณาเลือกยอดเงินก่อนโอนครับ");
                return;
            }
            // ลิงก์กลางสำหรับเรียกแอปธนาคาร
            window.location.href = `https://payment.facebook.com/pay/promptpay/`;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // ลดขนาดรูปภาพเพื่อประหยัดพื้นที่ Database
                    const maxWidth = 500;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.6);
                    
                    document.getElementById('preview-img').src = base64Image;
                    document.getElementById('preview-container').classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    checkReady();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function checkReady() {
            const btn = document.getElementById('submit-btn');
            if (selectedAmount > 0 && base64Image !== "") {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        async function processSubmit() {
            const name = document.getElementById('sender-name').value || "ไม่ประสงค์ออกนาม";
            const message = document.getElementById('tip-message').value || "ขอเพลงมันส์ๆ ครับ!";
            const btn = document.getElementById('submit-btn');

            btn.innerText = "กำลังส่งไปที่จอ...";
            btn.disabled = true;

            try {
                await db.ref('live_tips').push({
                    sender: name,
                    message: message,
                    amount: selectedAmount,
                    photo: base64Image,
                    timestamp: Date.now()
                });

                alert("ส่งสำเร็จ! รูปสลิปและข้อความจะขึ้นจอในครู่เดียวครับ");
                location.reload(); 
            } catch (error) {
                alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้งครับ");
                btn.innerText = "ส่ง TIPS ขึ้นจอ LED";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
