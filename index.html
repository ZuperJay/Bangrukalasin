<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU KALASIN - Tips System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: white; }
        .logo-3d { font-family: 'Orbitron', sans-serif; text-shadow: 3px 3px 0px #ff0088, 6px 6px 0px #000; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .led-text { white-space: nowrap; animation: march 10s linear infinite; color: #ff0088; text-shadow: 0 0 10px #ff0088; }
        @keyframes march { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .btn-gradient { background: linear-gradient(45deg, #ff0088, #ff6bb6); transition: 0.3s; }
        .btn-gradient:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 0, 136, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <nav class="w-full flex justify-between items-center mb-8 px-2">
        <h1 class="logo-3d text-2xl font-bold italic">BANGRU</h1>
        <button onclick="toggleLineup()" class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-colors">
            <i class="fas fa-calendar-alt text-pink-500"></i>
            <span>LINE UP</span>
        </button>
    </nav>

    <div class="w-full overflow-hidden bg-white/5 py-2 mb-8 rounded-lg border border-white/10">
        <div class="led-text font-bold tracking-widest text-xl text-uppercase">WELCOME TO BANGRU KALASIN • ยินดีต้อนรับสู่บางรู กาฬสินธุ์ • SEND TIPS TO DJ</div>
    </div>

    <div class="w-full max-w-md bg-white/5 backdrop-blur-md p-6 rounded-3xl border border-white/20">
        <div class="text-center mb-6">
            <p class="text-gray-400 text-sm">โอนเข้าบัญชี กสิกรไทย</p>
            <p class="text-white font-bold text-lg">วาที ศรีอุดร</p>
            <p class="text-pink-500 font-bold">093-8-29649-9</p>
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm text-gray-400">ชื่อผู้ส่ง</label>
            <input type="text" id="sender-name" class="w-full bg-black/50 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-pink-500" placeholder="ใส่ชื่อของคุณ">
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm text-gray-400">ข้อความถึง DJ / Staff</label>
            <textarea id="tip-message" class="w-full bg-black/50 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:border-pink-500" rows="2" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="selectAmount(50)" class="amount-btn border border-white/20 rounded-xl py-3 hover:bg-pink-500 transition-all">50.-</button>
            <button onclick="selectAmount(100)" class="amount-btn border border-white/20 rounded-xl py-3 hover:bg-pink-500 transition-all">100.-</button>
            <button onclick="selectAmount(500)" class="amount-btn border border-white/20 rounded-xl py-3 hover:bg-pink-500 transition-all">500.-</button>
        </div>

        <button onclick="handleSubmit()" class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg shadow-lg">
            ส่ง Tips & เปิดแอปธนาคาร
        </button>
    </div>

    <div id="lineup-modal" class="fixed inset-0 z-50 hidden bg-black/95 flex items-center justify-center p-4">
        <div class="relative w-full max-w-2xl text-center">
            <button onclick="toggleLineup()" class="absolute -top-12 right-0 text-white text-4xl">&times;</button>
            <img src="lineup.png" alt="Lineup" class="w-full rounded-2xl shadow-2xl border border-white/20">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:b3c5ada0ad8eb240ea1b90"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedAmount = 0;

        function selectAmount(amt) {
            selectedAmount = amt;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('bg-pink-500', 'border-transparent'));
            event.target.classList.add('bg-pink-500', 'border-transparent');
        }

        function toggleLineup() {
            document.getElementById('lineup-modal').classList.toggle('hidden');
        }

        async function handleSubmit() {
            const name = document.getElementById('sender-name').value;
            const message = document.getElementById('tip-message').value;

            if(!name || selectedAmount === 0) {
                alert('กรุณาใส่ชื่อและเลือกจำนวนเงิน');
                return;
            }

            await db.ref('live_tips').push({
                sender: name,
                message: message,
                amount: selectedAmount,
                timestamp: Date.now()
            });

            [span_0](start_span)[span_1](start_span)// ลิงก์โอนเงินเข้าบัญชี วาที ศรีอุดร 093-8-29649-9[span_0](end_span)[span_1](end_span)
            window.location.href = `promptpay://pay/0938296499/${selectedAmount}`;
        }
    </script>
</body>
</html>
