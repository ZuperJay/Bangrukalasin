
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANGRU — TIP & BOOKING V.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --or: #ff6a00; --or-g: linear-gradient(45deg, #ff6a00, #ff9a3c);
            --gr: #00e878; --cy: #00d8ee; --pk: #ff2d78; --pu: #c084fc;
            --gd: #d97706; --rd: #f06060; --bg: #050508;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --blur: blur(15px);
            --glow: 0 0 20px rgba(255, 106, 0, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* FULLSCREEN VIDEO BACKGROUND - เหมือนเดิม */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            filter: brightness(0.4) contrast(1.1);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(5,5,8,0.8) 100%);
            z-index: -99;
        }

        /* HEADER SECTION */
        header {
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--or);
            text-shadow: var(--glow);
            margin-bottom: 5px;
        }

        .top-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 500px;
            margin: 20px auto 0;
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: var(--blur);
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-btn.active {
            background: var(--or);
            color: #000;
            border-color: var(--or);
            box-shadow: var(--glow);
        }

        /* CONTAINER & CARDS */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .page-section { display: none; animation: slideUp 0.5s ease; }
        .page-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-title {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--or);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .f-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-family: 'Kanit';
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .f-input:focus { border-color: var(--or); background: rgba(0,0,0,0.5); }

        /* AMOUNT GRID */
        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .amt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 5px;
            color: #fff;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .amt-btn.active {
            background: var(--or);
            color: #000;
            border-color: var(--or);
            transform: scale(1.05);
        }

        /* UPLOAD BOX */
        .upload-box {
            width: 100%;
            height: 160px;
            border: 2px dashed #444;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            margin-bottom: 15px;
        }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; display: none; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            background: #222;
            color: #555;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-main.ready {
            background: var(--or-g);
            color: #fff;
            box-shadow: var(--glow);
        }

        /* MAP V.4 - จากโค้ดเดิม */
        .map-wrap { overflow-x: auto; padding: 10px 0; }
        .map-inner { min-width: 850px; display: flex; gap: 20px; padding: 20px; }
        .zone { border: 1px solid #333; border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.4); position: relative; }
        .z-title { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #07070a; padding: 0 10px; font-family: 'Orbitron'; font-size: 9px; font-weight: 900; color: #666; }
        
        .t {
            width: 34px; height: 34px; border-radius: 8px; border: 1px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 11px; font-weight: 700;
            background: #111; color: #888; cursor: pointer; transition: 0.2s;
        }
        .t.booked { background: #000; border-color: #222; color: #222; cursor: not-allowed; }
        .t.selected { border-color: #fff; color: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.1); z-index: 5; }
        
        /* Zone Color Glows */
        .z-gr .t:not(.booked) { border-color: var(--gr); color: var(--gr); box-shadow: 0 0 5px rgba(0,232,120,0.2); }
        .z-rd .t:not(.booked) { border-color: var(--rd); color: var(--rd); box-shadow: 0 0 5px rgba(240,96,96,0.2); }
        .z-cy .t:not(.booked) { border-color: var(--cy); color: var(--cy); box-shadow: 0 0 5px rgba(0,216,238,0.2); }
        
        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; flex-direction: column; }
        .close-modal { position: absolute; top: 25px; right: 25px; background: none; border: none; color: #fff; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- VIDEO BACKGROUND -->
    <video id="bg-video" autoplay muted loop playsinline poster="bg-poster.jpg">
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header>
        <h1 class="logo-text">BANGRU</h1>
        <div class="top-nav">
            <div class="nav-btn active" id="btn-tip" onclick="nav('tip')"><span>💸</span>ทิป DJ</div>
            <div class="nav-btn" id="btn-book" onclick="nav('book')"><span>🪑</span>จองโต๊ะ</div>
            <div class="nav-btn" onclick="toggleModal('m-promo')"><span>🔥</span>โปรฯ</div>
            <div class="nav-btn" onclick="toggleModal('m-lineup')"><span>🎧</span>DJ</div>
        </div>
    </header>

    <div class="container">
        <!-- PAGE: TIP -->
        <div id="page-tip" class="page-section active">
            <div class="card">
                <span class="card-title">1. ข้อมูลการส่งทิป</span>
                <label class="upload-box" id="u-box">
                    <input type="file" hidden accept="image/*" onchange="processImg(this, 'u')">
                    <div id="u-ui">👤 อัปโหลดรูปโปรไฟล์</div>
                    <img id="u-img">
                </label>
                <input type="text" id="t-name" class="f-input" placeholder="ชื่อของคุณ">
                <textarea id="t-msg" class="f-input" rows="2" placeholder="ข้อความที่อยากบอก..."></textarea>
            </div>

            <div class="card">
                <span class="card-title">2. เลือกจำนวนทิป</span>
                <div class="amt-grid">
                    <button class="amt-btn" onclick="setA(this, 40)">40</button>
                    <button class="amt-btn active" onclick="setA(this, 50)">50</button>
                    <button class="amt-btn" onclick="setA(this, 100)">100</button>
                    <button class="amt-btn" onclick="setA(this, 200)">200</button>
                    <button class="amt-btn" onclick="setA(this, 500)">500</button>
                    <button class="amt-btn" onclick="setA(this, 1000)">1000</button>
                </div>
                
                <div style="text-align:center; margin-bottom: 20px;">
                    <img src="qr.png" onerror="this.src='https://via.placeholder.com/200?text=PROMPTPAY+QR'" style="width:200px; border:5px solid #fff; border-radius:15px; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
                </div>

                <div style="background:rgba(255,255,255,0.05); padding:18px; border-radius:15px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size:0.7rem; color:#888;">PROMPT PAY</div>
                        <div style="font-size:1.3rem; color:var(--gr); font-weight:bold; font-family:'Orbitron';">0642653497</div>
                    </div>
                    <button onclick="copy('0642653497')" style="background:var(--or); border:none; padding:10px 15px; border-radius:10px; color:#000; font-weight:bold; cursor:pointer;">Copy</button>
                </div>
            </div>

            <div class="card">
                <span class="card-title">3. แนบสลิปยืนยัน</span>
                <label class="upload-box" id="s-box" style="border-color:var(--gr)">
                    <input type="file" hidden accept="image/*" onchange="processImg(this, 's')">
                    <div id="s-ui" style="color:var(--gr)">📄 แตะเพื่อแนบรูปสลิป</div>
                    <img id="s-img">
                </label>
            </div>
            <button id="btn-send" class="btn-main" onclick="sendTip()">ส่งขึ้นจอ LED</button>
        </div>

        <!-- PAGE: BOOKING (FULL MAP RESTORED) -->
        <div id="page-book" class="page-section">
            <div class="card" style="padding:10px;">
                <div class="map-wrap">
                    <div class="map-inner">
                        <div class="m-col" style="width:90px;">
                            <div class="zone z-gr"><div class="z-title">Z5 UP</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;"><div class="t" id="t-55u">55</div><div class="t" id="t-56u">56</div><div class="t" id="t-57u">57</div><div class="t" id="t-58u">58</div><div class="t" id="t-59u">59</div><div class="t" id="t-60u">60</div><div class="t" id="t-61u">61</div><div class="t" id="t-62u">62</div><div class="t" id="t-63u">63</div><div class="t" id="t-64u">64</div></div></div>
                        </div>
                        <div class="m-col" style="flex:1;">
                            <div style="background:var(--or); color:#000; text-align:center; padding:12px; font-family:'Orbitron'; font-weight:900; border-radius:10px; margin-bottom:15px;">DJ STAGE</div>
                            <div class="zone z-rd"><div class="z-title">ZONE 1</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"><div class="t" id="t-1">1</div><div class="t" id="t-2">2</div><div class="t" id="t-3">3</div><div class="t" id="t-4">4</div><div class="t" id="t-5">5</div><div class="t" id="t-6">6</div><div class="t" id="t-7">7</div><div class="t" id="t-8">8</div><div class="t" id="t-9">9</div><div class="t" id="t-10">10</div><div class="t" id="t-11">11</div><div class="t" id="t-12">12</div></div></div>
                        </div>
                        <div class="m-col" style="width:160px;">
                             <div class="zone z-cy"><div class="z-title">ZONE 3</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"><div class="t" id="t-27">27</div><div class="t" id="t-28">28</div><div class="t" id="t-29">29</div><div class="t" id="t-30">30</div><div class="t" id="t-31">31</div><div class="t" id="t-32">32</div><div class="t" id="t-33">33</div><div class="t" id="t-34">34</div></div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="book-form" class="card" style="display:none; margin-top:15px;">
                <h3 id="b-title" style="color:var(--cy); margin-bottom:15px; font-family:'Orbitron';">TABLE: --</h3>
                <input type="text" id="b-name" class="f-input" placeholder="ชื่อผู้จอง">
                <input type="tel" id="b-tel" class="f-input" placeholder="เบอร์โทร">
                <button class="btn-main ready" onclick="submitBook()">ยืนยันจองโต๊ะ</button>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="m-promo" class="modal">
        <button class="close-modal" onclick="toggleModal('m-promo')">&times;</button>
        <img src="promo1.jpg" style="width:100%; max-width:400px; border-radius:15px; border:1px solid var(--or);">
    </div>
    <div id="m-lineup" class="modal">
        <button class="close-modal" onclick="toggleModal('m-lineup')">&times;</button>
        <img src="lineup.png" style="width:100%; max-width:400px; border-radius:15px; border:1px solid var(--cy);">
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            messagingSenderId: "150447340465",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        let tipAmt = 50, uData = "", sData = "", selTable = "";

        function nav(p) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + p).classList.add('active');
            if(p === 'book') initMap();
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function setA(btn, v) { 
            document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            tipAmt = v; 
        }
        function copy(t) {
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert('คัดลอกเบอร์โทรแล้ว: ' + t);
        }

        function processImg(input, type) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = (type === 's') ? 800 : 300;
                        if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById(type + '-img').src = data;
                        document.getElementById(type + '-img').style.display = 'block';
                        document.getElementById(type + '-ui').style.display = 'none';
                        if(type === 'u') uData = data;
                        if(type === 's') { sData = data; document.getElementById('btn-send').classList.add('ready'); }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function sendTip() {
            if(!sData) return alert('กรุณาแนบสลิป');
            const b = document.getElementById('btn-send'); b.disabled = true; b.innerText = "SENDING...";
            try {
                await db.ref('live_tips').push({
                    name: document.getElementById('t-name').value || 'FC',
                    message: document.getElementById('t-msg').value || '',
                    amount: tipAmt, photo: uData, slip: sData, ts: Date.now()
                });
                alert('ส่งข้อมูลสำเร็จ! รอขึ้นจอ LED');
                location.reload();
            } catch(e) { alert('Error!'); b.disabled = false; b.innerText = "ส่งขึ้นจอ LED"; }
        }

        function initMap() {
            db.ref('bookings').on('value', snap => {
                const data = snap.val() || {};
                document.querySelectorAll('.t').forEach(el => {
                    const id = el.id.replace('t-', '');
                    el.classList.remove('booked', 'selected');
                    if(data[id]) {
                        el.classList.add('booked');
                        el.onclick = null;
                    } else {
                        el.onclick = () => selectT(id, el);
                    }
                });
            });
        }

        function selectT(id, el) {
            document.querySelectorAll('.t').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selTable = id;
            document.getElementById('b-title').innerText = "TABLE: " + id.replace(/[ul]/g, '');
            document.getElementById('book-form').style.display = 'block';
        }

        async function submitBook() {
            const n = document.getElementById('b-name').value;
            const t = document.getElementById('b-tel').value;
            if(!n || !t) return alert("ใส่ชื่อและเบอร์โทร");
            try {
                await db.ref('bookings/' + selTable).set({ name: n, tel: t, ts: Date.now() });
                alert("จองสำเร็จ!");
                document.getElementById('book-form').style.display = 'none';
            } catch(e) { alert("Error!"); }
        }
    </script>
</body>
</html>
