
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANGRU - ADMIN APPROVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: 'Kanit'; padding: 20px; }
        .list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .item { background: #222; border: 1px solid #444; border-radius: 15px; padding: 15px; }
        .imgs { display: flex; gap: 10px; margin: 10px 0; }
        /* ปรับให้ cursor เป็นรูปนิ้วชี้ เพื่อให้รู้ว่ากดได้ */
        .imgs img { width: 48%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .imgs img:hover { filter: brightness(1.2); }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .btn-approve { width: 100%; padding: 15px; background: #00e878; color: #000; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        .btn-approve:hover { filter: brightness(1.2); }
        .btn-reject { width: 100%; padding: 10px; background: #333; color: #f06060; border: none; border-radius: 10px; margin-top: 8px; font-size: 12px; cursor: pointer; }
        h1 { font-family: 'Orbitron'; color: #ff6a00; border-bottom: 2px solid #ff6a00; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* เพิ่ม CSS สำหรับกรอบเด้งขยายรูป (Modal) */
        #img-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out;
        }
        #img-modal img { 
            max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 10px; border: 2px solid #ff6a00;
        }
    </style>
</head>
<body>
    <h1>TIPS APPROVAL</h1>
    <div id="list" class="list"></div>

    <!-- ส่วนที่เพิ่มมา: กล่องสำหรับแสดงรูปขนาดเต็มจอ -->
    <div id="img-modal" onclick="this.style.display='none'">
        <img id="full-img" src="">
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyDgpZ0T2E7yO7EjnfVwZzesKw0eNJC7kJc",
            authDomain: "bangru-kalasin.firebaseapp.com",
            databaseURL: "https://bangru-kalasin-default-rtdb.firebaseio.com",
            projectId: "bangru-kalasin",
            storageBucket: "bangru-kalasin.firebasestorage.app",
            appId: "1:150447340465:web:d39c310e5e32030aea1b90"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        // ฟังก์ชันสำหรับเปิดรูปขยายเต็มจอ
        function viewImg(src) {
            document.getElementById('full-img').src = src;
            document.getElementById('img-modal').style.display = 'flex';
        }

        db.ref('live_tips').on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) { list.innerHTML = "No pending tips."; return; }

            Object.keys(data).reverse().forEach(key => {
                const tip = data[key];
                if(tip.status !== 'pending') return;

                const card = document.createElement('div');
                card.className = "item";
                // เพิ่มคำสั่ง onclick="viewImg(this.src)" เข้าไปในแท็ก img ทั้งสองอัน
                card.innerHTML = `
                    <div style="font-size: 1.2rem; font-weight: bold; color: #00d8ee;">${tip.amount} THB</div>
                    <div style="font-size: 1rem; margin-bottom: 5px;">โดย: ${tip.name}</div>
                    <div style="font-size: 0.9rem; color: #ccc;">"${tip.message}"</div>
                    <div class="imgs">
                        <div>
                            <div class="label">Profile</div>
                            <img src="${tip.photo || 'https://via.placeholder.com/150'}" onclick="viewImg(this.src)">
                        </div>
                        <div>
                            <div class="label">Slip (Check this!)</div>
                            <img src="${tip.slip}" style="border: 2px solid #00e878;" onclick="viewImg(this.src)">
                        </div>
                    </div>
                    <button class="btn-approve" onclick="approve('${key}')">APPROVE & SHOW ON SCREEN</button>
                    <button class="btn-reject" onclick="reject('${key}')">REJECT / DELETE</button>
                `;
                list.appendChild(card);
            });
        });

        function approve(key) {
            db.ref('live_tips/' + key).update({ status: 'approved', approvedAt: Date.now() });
        }
        function reject(key) {
            if(confirm('Delete this tip?')) db.ref('live_tips/' + key).remove();
        }
    </script>
</body>
</html>
